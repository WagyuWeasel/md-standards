name: MD Standards Validator

on:
  schedule:
    - cron: '0 9 */3 * *'
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Lint all Markdown files
        run: markdownlint-cli2 "templates/**/*.md" "*.md"

  structure:
    name: Validate Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run structure validation
        run: |
          chmod +x scripts/validate-structure.sh
          bash scripts/validate-structure.sh

  completeness:
    name: Check Completeness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run completeness check
        run: |
          chmod +x scripts/validate-completeness.sh
          bash scripts/validate-completeness.sh completeness

  cross-reference:
    name: Cross-Reference Check
    runs-on: ubuntu-latest
    needs: [completeness]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run cross-reference check
        run: |
          chmod +x scripts/validate-completeness.sh
          bash scripts/validate-completeness.sh crossref

  notify:
    name: Create Issue on Failure
    runs-on: ubuntu-latest
    needs: [lint, structure, completeness, cross-reference]
    if: failure() && github.event_name == 'schedule'
    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `MD Standards Validation Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Scheduled Validation Failed',
              '',
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'One or more validation jobs failed during the scheduled 3-day check.',
              'Review the workflow run above for details and fix any violations.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['validation-failure'],
            });
